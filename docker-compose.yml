x-logging: &id001
  driver: json-file
  options:
    max-size: 10m
    max-file: '3'
services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt:
    - no-new-privileges:true
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./config/portainer:/data
    ports:
    - 9000:9000
    logging: *id001
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    volumes:
    - /data:/srv
    - /fast:/srv/NVMe-Fast
    - ./config/filebrowser:/database
    ports:
    - 8080:80
    logging: *id001
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.8.0
    container_name: kiwix
    labels:
    - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped
    volumes:
    - /fast/kiwix:/data
    ports:
    - 8081:8080
    logging: *id001
    entrypoint:
    - sh
    - -c
    - kiwix-serve --port=8080 --skipInvalid /data/*.zim
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich-server
    security_opt:
    - no-new-privileges:true
    restart: always
    volumes:
    - /data/Gallery:/usr/src/app/upload
    - /fast/immich-thumbs:/usr/src/app/upload/thumbs
    - /etc/localtime:/etc/localtime:ro
    environment:
    - DB_HOSTNAME=immich-postgres
    - DB_USERNAME=${DB_USERNAME:-postgres}
    - DB_PASSWORD=${DB_PASSWORD:-immich}
    - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
    - REDIS_HOSTNAME=immich-redis
    - IMMICH_TRUSTED_PROXIES=192.168.51.14
    ports:
    - 2283:2283
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    logging: *id001
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5-openvino
    container_name: immich-machine-learning
    security_opt:
    - no-new-privileges:true
    restart: always
    volumes:
    - /fast/immich-ml/model-cache:/cache
    environment:
    - DB_HOSTNAME=immich-postgres
    - DB_USERNAME=${DB_USERNAME:-postgres}
    - DB_PASSWORD=${DB_PASSWORD:-immich}
    - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
    - REDIS_HOSTNAME=immich-redis
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    logging: *id001
  immich-redis:
    image: docker.io/valkey/valkey:9
    container_name: immich-redis
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *id001
  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: always
    environment:
    - POSTGRES_PASSWORD=${DB_PASSWORD:-immich}
    - POSTGRES_USER=${DB_USERNAME:-postgres}
    - POSTGRES_DB=${DB_DATABASE_NAME:-immich}
    - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
    - /fast/immich-db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready --dbname='${DB_DATABASE_NAME:-immich}' --username='${DB_USERNAME:-postgres}'
        || exit 1
      interval: 5m
      start_period: 5m
    logging: *id001
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
    - NET_ADMIN
    devices:
    - /dev/net/tun:/dev/net/tun
    ports:
    - 7878:7878
    - 8082:8082
    - 8686:8686
    - 8787:8787
    - 8989:8989
    - 9117:9117
    - 8191:8191
    - 10315:10315
    - 8000:8000
    - 10315:10315/udp
    volumes:
    - /data/docker/gluetun:/gluetun
    environment:
    - VPN_SERVICE_PROVIDER=airvpn
    - VPN_TYPE=wireguard
    - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
    - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
    - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
    - SERVER_CITIES=Chicago Illinois
    - FIREWALL_VPN_INPUT_PORTS=10315
    - FIREWALL_OUTBOUND_SUBNETS=172.16.0.0/12,192.168.51.0/24
    - DOT=on
    - BLOCK_MALICIOUS=on
    - BLOCK_SURVEILLANCE=on
    - UPDATER_PERIOD=24h
    - TZ=America/New_York
    healthcheck:
      test: /gluetun-entrypoint healthcheck
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging: *id001
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - UMASK=002
    - TZ=America/New_York
    - WEBUI_PORT=8082
    - TORRENTING_PORT=10315
    volumes:
    - /fast/configs/qbittorrent:/config
    - /data:/data
    logging: *id001
  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    container_name: flaresolverr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    environment:
    - LOG_LEVEL=info
    - LOG_HTML=false
    - TZ=America/New_York
    logging: *id001
  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - AUTO_UPDATE=true
    volumes:
    - /fast/configs/jackett:/config
    - /data/torrents:/downloads
    logging: *id001
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - NO_PROXY=*
    - no_proxy=*
    volumes:
    - /fast/configs/radarr:/config
    - /data:/data
    - /data/usenet:/data/usenet
    stop_grace_period: 30s
    logging: *id001
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - NO_PROXY=*
    - no_proxy=*
    volumes:
    - /fast/configs/sonarr:/config
    - /data:/data
    - /data/usenet:/data/usenet
    stop_grace_period: 30s
    logging: *id001
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - NO_PROXY=*
    - no_proxy=*
    volumes:
    - /fast/configs/lidarr:/config
    - /data:/data
    - /data/usenet:/data/usenet
    stop_grace_period: 30s
    logging: *id001
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    volumes:
    - /fast/configs/bazarr:/config
    - /data/Media:/data/Media
    ports:
    - 6767:6767
    logging: *id001
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: always
    ports:
    - 3001:3001
    volumes:
    - /fast/configs/uptime-kuma:/app/data
    - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *id001
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    environment:
    - ND_LOGLEVEL=info
    - ND_SESSIONTIMEOUT=24h
    - ND_BASEURL=
    - ND_ENABLETRANSCODINGCONFIG=true
    - ND_TRANSCODINGCACHESIZE=150MB
    - ND_COVERARTPRIORITY=cover.*, folder.*, front.*, embedded, online
    - ND_ENABLEEXTERNALSERVICES=true
    - ND_ARTISTARTPRIORITY=artist.*, external
    - ND_DEFAULTLANGUAGE=en
    - ND_SCANSCHEDULE=1h
    - ND_ENABLECOVERANIMATION=true
    volumes:
    - ./config/navidrome:/data
    - /data/Media/Music:/music:ro
    ports:
    - 4533:4533
    logging: *id001
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    group_add:
    - '988'
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - HOMEPAGE_ALLOWED_HOSTS=192.168.51.83:3100,dash.thedingwalls.com,localhost:3000,localhost:3100,homepage:3000
    volumes:
    - /data:/data:ro
    - ./config/homepage:/app/config
    - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
    - 3100:3000
    logging: *id001
  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr
    init: true
    user: root
    entrypoint:
    - sh
    - -c
    - chmod 644 /etc/hosts /etc/resolv.conf && exec docker-entrypoint.sh npm start
    extra_hosts:
    - localhost:127.0.0.1
    restart: unless-stopped
    environment:
    - TZ=America/New_York
    - HOSTNAME=0.0.0.0
    volumes:
    - ./config/jellyseerr:/app/config
    ports:
    - 5055:5055
    logging: *id001
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - DOCKER_MODS=linuxserver/mods:universal-calibre
    volumes:
    - /fast/configs/calibre-web:/config
    - /fast/calibre-library:/books
    ports:
    - 8083:8083
    logging: *id001
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: 1000:1000
    group_add:
    - '0'
    environment:
    - JELLYFIN_PublishedServerUrl=http://192.168.51.83:8096
    volumes:
    - /fast/jellyfin-cache:/config
    - /fast/jellyfin-cache/cache:/cache
    - /data/Media:/media:rw
    ports:
    - 8096:8096
    dns:
    - 8.8.8.8
    - 8.8.4.4
    logging: *id001
  picard:
    image: mikenye/picard:latest
    container_name: picard
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    volumes:
    - ./config/picard:/config
    - /data/Media/Music:/music
    ports:
    - 5080:5800
  command-center:
    image: nginx:alpine
    container_name: command-center
    restart: unless-stopped
    ports:
    - 3080:80
    volumes:
    - ./command-center:/usr/share/nginx/html:ro
    - ./command-center/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    - /fast/apps:/apps:ro
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    environment:
    - TZ=America/New_York
    volumes:
    - ./config/ntfy/cache:/var/cache/ntfy
    - ./config/ntfy/etc:/etc/ntfy
    ports:
    - 8090:80
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  seafile-mysql:
    image: mariadb:10.11
    container_name: seafile-mysql
    restart: unless-stopped
    environment:
    - MYSQL_ROOT_PASSWORD=${SEAFILE_MYSQL_ROOT_PASSWORD}
    - MYSQL_LOG_CONSOLE=true
    - MARIADB_AUTO_UPGRADE=1
    volumes:
    - /fast/configs/seafile-mysql:/var/lib/mysql
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  seafile-memcached:
    image: memcached:1.6-alpine
    container_name: seafile-memcached
    restart: unless-stopped
    entrypoint: memcached -m 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  seafile:
    image: seafileltd/seafile-mc:latest
    container_name: seafile
    restart: unless-stopped
    ports:
    - 8084:80
    volumes:
    - /data/seafile:/shared
    environment:
    - DB_HOST=seafile-mysql
    - DB_ROOT_PASSWD=${SEAFILE_MYSQL_ROOT_PASSWORD}
    - SEAFILE_ADMIN_EMAIL=${SEAFILE_ADMIN_EMAIL}
    - SEAFILE_ADMIN_PASSWORD=${SEAFILE_ADMIN_PASSWORD}
    - SEAFILE_SERVER_HOSTNAME=cloud.thedingwalls.com
    - SEAFILE_SERVER_LETSENCRYPT=false
    - TIME_ZONE=America/Indiana/Indianapolis
    depends_on:
    - seafile-mysql
    - seafile-memcached
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  tinyproxy:
    image: kalaksi/tinyproxy
    container_name: tinyproxy
    network_mode: service:gluetun
    volumes:
    - ./config/tinyproxy/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
    restart: unless-stopped
  whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: whisper
    restart: unless-stopped
    ports:
    - 10300:10300
    volumes:
    - /fast/configs/whisper:/data
    environment:
    - TZ=America/Indiana/Indianapolis
    command: --model small-int8 --language en
    healthcheck:
      test:
      - CMD-SHELL
      - nc -z localhost 10300 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: piper
    restart: unless-stopped
    ports:
    - 10200:10200
    volumes:
    - /fast/configs/piper:/data
    environment:
    - TZ=America/Indiana/Indianapolis
    command: --voice en_US-amy-medium
    healthcheck:
      test:
      - CMD-SHELL
      - nc -z localhost 10200 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  bonob:
    image: simojenki/bonob:latest
    container_name: bonob
    network_mode: host
    user: "1000:1000"
    environment:
      - BNB_PORT=4534
      - BNB_URL=https://bonob.thedingwalls.com
      - BNB_SECRET=${BNB_SECRET}
      - BNB_SONOS_AUTO_REGISTER=false
      - BNB_SONOS_DEVICE_DISCOVERY=true
      - BNB_SONOS_SERVICE_ID=246
      - BNB_SONOS_SEED_HOST=192.168.51.47
      - BNB_SUBSONIC_URL=http://localhost:4533
      - TZ=America/Indiana/Indianapolis
    restart: unless-stopped
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Indiana/Indianapolis
    volumes:
      - /fast/configs/syncthing:/config
      - /data/Knowledge/ObsidianVault:/data/ObsidianVault
      - /data/Knowledge/Supernote:/data/Supernote
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  # ============================================
  # DATA BACKBONE
  # ============================================

  # PostgreSQL Central — shared database backbone for all Dingwall apps.
  # This is NOT the Immich database. This is the platform DB for the PWA
  # ecosystem, family sites, portfolio projects, and anything new.
  # Credentials: mounted via Docker secrets at /run/secrets/, never in env vars.
  postgres-central:
    image: postgres:16-alpine
    container_name: postgres-central
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=dingwall
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_central_password
      - POSTGRES_DB=dingwall_hub
      - TZ=America/Indiana/Indianapolis
    secrets:
      - postgres_central_password
    volumes:
      - /fast/configs/postgres-central:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dingwall -d dingwall_hub"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # pgAdmin — PostgreSQL web management UI.
  # Login email hardcoded (not sensitive). Password via Docker secrets.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - PGADMIN_DEFAULT_EMAIL=nick@thedingwalls.com
      - PGADMIN_DEFAULT_PASSWORD_FILE=/run/secrets/pgadmin_password
      - PGADMIN_CONFIG_SERVER_MODE=True
      - TZ=America/Indiana/Indianapolis
    secrets:
      - pgadmin_password
    volumes:
      - /fast/configs/pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres-central:
        condition: service_healthy

# Top-level secrets declaration — maps secret names to host files.
# Docker mounts these into containers at /run/secrets/<name> on tmpfs.
secrets:
  postgres_central_password:
    file: ./secrets/postgres_central_password
  pgadmin_password:
    file: ./secrets/pgadmin_password
